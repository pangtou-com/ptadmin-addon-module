name: Sync SDK Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: SDK version to sync into this template
        required: true
        type: string
  repository_dispatch:
    types:
      - sdk-release

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version input
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version }}"
          if [ -z "$VERSION" ]; then
            echo "Missing sdk version payload" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync package versions
        run: node ./scripts/sync-sdk-version.mjs --version "${{ steps.version.outputs.value }}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: sync frontend sdk ${{ steps.version.outputs.value }}"
          branch: "chore/sync-sdk-${{ steps.version.outputs.value }}"
          delete-branch: true
          title: "chore: sync frontend sdk ${{ steps.version.outputs.value }}"
          body: |
            Sync template sdk dependencies to `${{ steps.version.outputs.value }}`.
